apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetris-argocd
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/techgeil/python.git
    targetRevision: main
    path: tetris
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true