name: bygger docker image
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the Docker image
        run: docker build -t "hello-python" ./test
      - name: Run the Docker container
        run: docker run -d -p 80:80 --name hello-python-container hello-python
